<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>India Field Survey Crop Atlas</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="icon" type="image/png" sizes="16x16" href="favicon.png">

    <meta name="title" content="India Field Survey Crop Atlas">
    <meta name="description" content="India Field Survey Crop Atlas">



    <meta name="theme-color" content="#0d6efd">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v10.6.0/ol.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://viglino.github.io/font-gis/css/font-gis.css" rel="stylesheet" />


    <link rel="stylesheet" href="style.css">



</head>

<body>
    <nav>
        <h1>India Field Survey Crop Atlas</h1>


    </nav>



    <div class="dash_container">
        <div class="loader_container" id="page_loader" style="display: none;">
            <div class="loader"></div>

        </div>







        <div class="row w-100 g-0">
            <div class="col-md-9 ">
                <div id="map">
                    <div id="coordinates">
                    </div>

                    <div class="basemap-control">
                        <select id="basemapSelect">
                            <option value="osm" selected>OpenStreetMap</option>
                            <option value="street">Google Street Map</option>
                            <option value="sentinel">Sentinel-2 Cloudless</option>
                        </select>
                    </div>
                    <div id="search-container">
                        <div class="search-bar">
                            <svg class="search-bar-icon" aria-hidden="true" viewBox="0 0 24 24">
                                <g>
                                    <path
                                        d="M21.53 20.47l-3.66-3.66C19.195 15.24 20 13.214 20 11c0-4.97-4.03-9-9-9s-9 4.03-9 9 4.03 9 9 9c2.215 0 4.24-.804 5.808-2.13l3.66 3.66c.147.146.34.22.53.22s.385-.073.53-.22c.295-.293.295-.767.002-1.06zM3.5 11c0-4.135 3.365-7.5 7.5-7.5s7.5 3.365 7.5 7.5-3.365 7.5-7.5 7.5-7.5-3.365-7.5-7.5z">
                                    </path>
                                </g>
                            </svg>

                            <input id="searchInput" type="text" placeholder="Search Location"
                                oninput="getSuggestions(this.value)">

                            <!-- Clear button -->
                            <button id="clearSearch" class="search-bar-clear-btn" style="display:none;">✖</button>
                        </div>

                        <div id="location-suggestions"></div>
                    </div>





                    <div id="popup" class="ol-popup">
                        <div class="popup-close" id="popup-closer">✖</div>
                        <div id="popup-content"></div>
                    </div>




                </div>





            </div>
            <div class="col-md-3 pl-0">
                <div id="panel">
                    <div class="p-3">
                        <!-- <h5 class="mb-3">Crop Statistics</h5> -->

                        <div class="mb-2">
                            <strong>Total Points (Visible):</strong>
                            <span id="pointCount">0</span>
                        </div>

                        <hr>

                        <h6>🔍 Filters</h6>

                        <div class="mb-2">
                            <label class="form-label">Season</label>
                            <select id="seasonFilter" class="form-select form-select-sm">
                                <option value="">All</option>
                            </select>
                        </div>

                        <div class="mb-2">
                            <label class="form-label">Crop Name</label>
                            <select id="cropFilter" class="form-select form-select-sm">
                                <option value="">All</option>
                            </select>
                        </div>

                        <div class="mb-2">
                            <label class="form-label">Crop Type</label>
                            <select id="cropTypeFilter" class="form-select form-select-sm">
                                <option value="">All</option>
                            </select>
                        </div>

                        <hr>
                        <h6>Data Collected Date</h6>

                        <div class="mb-2">
                            <label class="form-label">Start Date</label>
                            <input type="date" id="startDate" class="form-control form-control-sm">
                        </div>

                        <div class="mb-2">
                            <label class="form-label">End Date</label>
                            <input type="date" id="endDate" class="form-control form-control-sm">
                        </div>


                        <button id="resetFilters" class="btn btn-sm btn-secondary w-100 mt-2">
                            Reset Filters
                        </button>

                        <button id="downloadGeoJSON" class="btn btn-sm btn-success w-100 mt-2">
    Download GeoJSON
</button>









                    </div>



                </div>

            </div>
        </div>






    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ol@v10.6.0/dist/ol.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/shpjs@latest/dist/shp.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@7/turf.min.js"></script>

    <link rel="stylesheet" href="https://cdn.rawgit.com/Viglino/ol-ext/master/dist/ol-ext.min.css" />
    <script type="text/javascript" src="https://cdn.rawgit.com/Viglino/ol-ext/master/dist/ol-ext.min.js"></script>






    <script>











        var geoJSONFormat = new ol.format.GeoJSON({});

        function toggleMapLoader(show) {
            const map_loader = document.getElementById('page_loader');
            if (map_loader) {
                map_loader.style.display = show ? 'flex' : 'none';  // Show loader if true, hide if false
            }
        }




        var streetMaplayer = new ol.layer.Tile({
            source: new ol.source.OSM({
                url: 'https://mt{0-3}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}',
                attributions: ['&copy; <a href="https://www.google.com/maps">Google</a>']
            }),
            visible: false
        })


        var sentinellayer = new ol.layer.Tile({
            source: new ol.source.TileWMS({
                url: 'https://tiles.maps.eox.at/wms?',
                params: { 'LAYERS': 's2cloudless_3857' },
                version: '1.1.1',
                format: 'image/png',
                ratio: 1,
                serverType: 'mapserver',
                attributions: [
                    'Sentinel-2 cloudless - <a href="https://s2maps.eu" target="_blank">s2maps.eu</a> by <a href="https://eox.at/" target="_blank">EOX IT Services GmbH</a>'
                ]
            }),
            visible: false
        });

        var osmLayer = new ol.layer.Tile({
            source: new ol.source.OSM(),
            visible: true
        });


        // --- FeatureServer ---
        const featureServiceURL =
            "https://gis.nwic.in/server/rest/services/surveycropdatacollectiondb/FeatureServer/0/query?" +
            "where=1%3D1&outFields=*&returnGeometry=true&f=geojson";

        // const vectorSource = new ol.source.Vector({
        //     format: new ol.format.GeoJSON(),
        //     url: featureServiceURL
        // });

        const vectorSource = new ol.source.Vector();

        const pageSize = 2000;
        let offset = 0;
        let loading = false;

        function loadAllFeatures() {
            const url =
                "https://gis.nwic.in/server/rest/services/surveycropdatacollectiondb/FeatureServer/0/query?" +
                "where=1=1" +
                "&outFields=*" +
                "&returnGeometry=true" +
                "&f=geojson" +
                `&resultOffset=${offset}` +
                `&resultRecordCount=${pageSize}`;

            fetch(url)
                .then(res => res.json())
                .then(data => {
                    if (!data.features || data.features.length === 0) {
                        populateFilters();
                        updateStats();
                        return;
                    }

                    const features = new ol.format.GeoJSON().readFeatures(data, {
                        featureProjection: 'EPSG:3857'
                    });

                    vectorSource.addFeatures(features);
                    offset += pageSize;
                    loading = false;

                    loadAllFeatures();
                });
        }

        loadAllFeatures();





        const markerStyle = new ol.style.Style({
            image: new ol.style.Icon({
                src: "https://cdn-icons-png.flaticon.com/512/684/684908.png",
                scale: 0.05,
                anchor: [0.5, 1]
            })
        });


        function toEpochStart(dateStr) {
            if (!dateStr) return null;
            return new Date(dateStr + "T00:00:00").getTime();
        }

        function toEpochEnd(dateStr) {
            if (!dateStr) return null;
            return new Date(dateStr + "T23:59:59").getTime();
        }

        function normalize(v) {
            return v ? v.trim().toLowerCase() : '';
        }

        function normalize(v) {
            return v ? v.trim().toLowerCase() : '';
        }

        function passesFilter(feature) {
            const season = normalize(document.getElementById('seasonFilter').value);
            const crop = normalize(document.getElementById('cropFilter').value);
            const cropType = normalize(document.getElementById('cropTypeFilter').value);

            const startDate = toEpochStart(document.getElementById('startDate').value);
            const endDate = toEpochEnd(document.getElementById('endDate').value);

            // Attribute filters
            if (season && normalize(feature.get('season')) !== season) return false;
            if (crop && normalize(feature.get('cropname')) !== crop) return false;
            if (cropType && normalize(feature.get('croptype')) !== cropType) return false;

            // Date filter (created_date)
            const created = feature.get('created_date');
            if (startDate && (!created || created < startDate)) return false;
            if (endDate && (!created || created > endDate)) return false;

            return true;
        }




        ['seasonFilter', 'cropFilter', 'cropTypeFilter', 'startDate', 'endDate'].forEach(id => {
            document.getElementById(id).addEventListener('change', () => {
                vectorLayer.changed();
                updateStats();
            });
        });





        const vectorLayer = new ol.layer.Vector({
            source: vectorSource,
            style: function (feature) {
                if (!passesFilter(feature)) return null;

                return markerStyle;
            }
        });






        const map = new ol.Map({
            target: 'map',
            layers: [osmLayer, streetMaplayer, sentinellayer, vectorLayer],
            view: new ol.View({ center: ol.proj.fromLonLat([0, 20]), zoom: 2 })
        });





        const container = document.getElementById("popup");
        const content = document.getElementById("popup-content");
        const closer = document.getElementById("popup-closer");

        const overlay = new ol.Overlay({
            element: container,
            autoPan: true,
            autoPanAnimation: {
                duration: 250
            }
        });

        map.addOverlay(overlay);

        closer.onclick = function () {
            overlay.setPosition(undefined);
            closer.blur();
            return false;
        };

        // --- Click event ---
        map.on("singleclick", function (evt) {
            overlay.setPosition(undefined);

            map.forEachFeatureAtPixel(evt.pixel, function (feature) {
                if (feature.get('isSearchMarker')) return;

                const props = { ...feature.getProperties() };
                delete props.geometry;

                let html = "<table>";
                for (const key in props) {
                    html += `
          <tr>
            <td class="key">${key}</td>
            <td>${props[key] ?? ''}</td>
          </tr>`;
                }
                html += "</table>";

                content.innerHTML = html;
                overlay.setPosition(evt.coordinate);
            });

        });




        function updateStats() {
            const extent = map.getView().calculateExtent(map.getSize());
            let count = 0;
            // console.log(vectorSource.getFeatures())

            vectorSource.getFeatures().forEach(f => {
                if (!passesFilter(f)) return;

                if (f.getGeometry().intersectsExtent(extent)) {
                    count++;
                }
            });

            document.getElementById('pointCount').textContent = count;
        }


        map.on('moveend', updateStats);


        document.getElementById('resetFilters').addEventListener('click', () => {
            document.getElementById('seasonFilter').value = '';
            document.getElementById('cropFilter').value = '';
            document.getElementById('cropTypeFilter').value = '';
            document.getElementById('startDate').value = '';
            document.getElementById('endDate').value = '';

            vectorLayer.changed();
            updateStats();
        });















        document.getElementById('basemapSelect').addEventListener('change', function () {
            streetMaplayer.setVisible(this.value === 'street');
            sentinellayer.setVisible(this.value === 'sentinel');
            osmLayer.setVisible(this.value === 'osm');
        });



        const scaleLineControl = new ol.control.ScaleLine({
            units: 'metric', // can be 'degrees', 'imperial', 'nautical', 'metric', 'us'
            bar: false,       // show as a scale bar
            steps: 4,        // number of segments in the scale bar
            text: true,      // show text labels
            minWidth: 140    // minimum width in pixels
        });

        // Add it to the map
        map.addControl(scaleLineControl);


        //Show X,Y coordinates
        const mousePositionControl = new ol.control.MousePosition({
            coordinateFormat: ol.coordinate.createStringXY(4), // 4 decimal places
            projection: 'EPSG:4326',
            target: document.getElementById('coordinates'),
            undefinedHTML: '&nbsp;'
        });
        map.addControl(mousePositionControl);



        // Function to update URL hash with current view
        function updateUrlHash() {
            const view = map.getView();
            const zoom = view.getZoom().toFixed(2);
            const center = ol.proj.toLonLat(view.getCenter());
            const lat = center[1].toFixed(3);
            const lon = center[0].toFixed(3);
            location.hash = `map=${zoom}/${lat}/${lon}`;
        }

        // Listen for map movement and update hash
        map.on('moveend', updateUrlHash);

        // On load, check if URL hash has map position
        function restoreMapViewFromHash() {
            if (location.hash.startsWith('#map=')) {
                const parts = location.hash.replace('#map=', '').split('/');
                if (parts.length === 3) {
                    const zoom = parseFloat(parts[0]);
                    const lat = parseFloat(parts[1]);
                    const lon = parseFloat(parts[2]);
                    map.getView().setCenter(ol.proj.fromLonLat([lon, lat]));
                    map.getView().setZoom(zoom);
                }
            }
        }

        // Run this on page load
        restoreMapViewFromHash();









        // Set your default center & zoom here
        const defaultCenter = ol.proj.fromLonLat([0, 20.000]); // India center
        const defaultZoom = 2;



        // ----------------------------
        // Location Search
        // ----------------------------

        const searchInput = document.getElementById("searchInput");
        const clearSearch = document.getElementById("clearSearch");
        const suggestionBox = document.getElementById("location-suggestions");
        const searchLayer = new ol.layer.Vector({ source: new ol.source.Vector() });
        map.addLayer(searchLayer);

        function addSearchMarker(lat, lon) {
            searchLayer.getSource().clear();

            const feature = new ol.Feature({
                geometry: new ol.geom.Point(ol.proj.fromLonLat([lon, lat]))
            });

            feature.setStyle(new ol.style.Style({
                image: new ol.style.Icon({
                    anchor: [0.5, 1],
                    src: 'https://cdn-icons-png.flaticon.com/512/684/684908.png',
                    scale: 0.05
                })
            }));
            feature.set('isSearchMarker', true);


            searchLayer.getSource().addFeature(feature);
        }

        function getSuggestions(query) {
            suggestionBox.innerHTML = "";
            suggestionBox.style.display = "none";

            if (!query || query.length < 2) return;

            // If it's lat,long just skip suggestions
            if (/^\s*-?\d+(\.\d+)?\s*,\s*-?\d+(\.\d+)?\s*$/.test(query)) return;

            fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=5`)
                .then(res => res.json())
                .then(data => {
                    if (data.length === 0) return;

                    data.forEach(item => {
                        const div = document.createElement("div");
                        div.textContent = item.display_name;
                        div.style.padding = "5px";
                        div.style.cursor = "pointer";
                        div.onmouseover = () => div.style.background = "#eee";
                        div.onmouseout = () => div.style.background = "#fff";
                        div.onclick = () => {
                            const lat = parseFloat(item.lat);
                            const lon = parseFloat(item.lon);
                            searchInput.value = item.display_name;
                            clearSearch.style.display = "block";


                            map.getView().animate({
                                center: ol.proj.fromLonLat([lon, lat]),
                                zoom: 14,
                                duration: 1000
                            });
                            addSearchMarker(lat, lon);

                            suggestionBox.style.display = "none";
                        };
                        suggestionBox.appendChild(div);
                    });

                    suggestionBox.style.display = "block";
                })
                .catch(err => console.error("Suggestion error:", err));
        }

        // Show/hide clear button
        searchInput.addEventListener("input", () => {
            clearSearch.style.display = searchInput.value.trim() ? "block" : "none";
        });

        // Clear everything
        clearSearch.addEventListener("click", () => {
            searchInput.value = "";
            clearSearch.style.display = "none";
            suggestionBox.innerHTML = "";
            suggestionBox.style.display = "none";
            searchLayer.getSource().clear(); // 🔹 remove marker
        });



        function populateFilters() {
            const seasons = new Set();
            const crops = new Set();
            const cropTypes = new Set();

            vectorSource.getFeatures().forEach(f => {
                if (f.get('season')) seasons.add(f.get('season').trim());
                if (f.get('cropname')) crops.add(f.get('cropname').trim());
                if (f.get('croptype')) cropTypes.add(f.get('croptype').trim());
            });

            fillSelect('seasonFilter', seasons);
            fillSelect('cropFilter', crops);
            fillSelect('cropTypeFilter', cropTypes);
        }

        function fillSelect(id, values) {
            const select = document.getElementById(id);
            values.forEach(v => {
                const opt = document.createElement('option');
                opt.value = v;
                opt.textContent = v;
                select.appendChild(opt);
            });
        }


        // ----------------------
// DOWNLOAD GEOJSON
// ----------------------

document.getElementById("downloadGeoJSON").addEventListener("click", () => {
    const allFeatures = vectorSource.getFeatures();

    // Filter the features using the same logic as the map style
    const filtered = allFeatures.filter(f => passesFilter(f));

    if (filtered.length === 0) {
        alert("No features match the filter.");
        return;
    }
    // console.log(filtered)

    // Convert to GeoJSON
    const geojson = new ol.format.GeoJSON().writeFeatures(filtered, {
        featureProjection: "EPSG:3857",
        dataProjection: "EPSG:4326"
    });

    // Create blob + download
    const blob = new Blob([geojson], { type: "application/json" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "india_cwc_crop_survey.geojson";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    URL.revokeObjectURL(url);
});









    </script>
</body>

</html>
